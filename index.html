<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARALLAX</title>

<style>
    :root {
        --glow-color: rgb(0, 255, 68);
        --glow-dim: rgba(0, 255, 68, 0.3);
        --bg-overlay: rgba(10, 16, 10, 0.85);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Courier New', Courier, monospace;
        color: #ffffff;
        height: 100vh;
        overflow: hidden;
        background-color: #050805;
        background-image: radial-gradient(circle, transparent 20%, #000000 80%);
    }

    /* Background Image with advanced blending */
    .background {
        position: fixed;
        inset: 0;
        background: url("images/image1.jpeg") center center / cover no-repeat;
        filter: brightness(0.4) contrast(1.4) grayscale(0.3);
        z-index: -3;
    }

    /* Dark terminal tint overlay */
    .overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, rgba(0,15,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
        z-index: -2;
    }

    /* Advanced CRT Scanlines & Glass Vignette */
    .scanlines {
        position: fixed;
        inset: 0;
        background: 
            linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
            linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
        z-index: 10;
    }

    /* Subtle Screen Flicker */
    .flicker {
        position: fixed;
        inset: 0;
        background: var(--glow-color);
        opacity: 0.015;
        pointer-events: none;
        animation: crt-flicker 0.15s infinite;
        z-index: 9;
    }

    @keyframes crt-flicker {
        0% { opacity: 0.015; }
        50% { opacity: 0.025; }
        100% { opacity: 0.012; }
    }

    /* Layout Wrapper */
    .content {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px;
        position: relative;
        z-index: 2;
    }

    /* Stylized Glitch Header */
    h1 {
        font-size: 4.5rem;
        font-weight: 900;
        letter-spacing: 14px;
        color: #ffffff;
        text-shadow: 
            0 0 8px var(--glow-color),
            0 0 20px var(--glow-dim);
        text-transform: uppercase;
        animation: text-pulse 3s infinite alternate;
    }

    @keyframes text-pulse {
        0% { text-shadow: 0 0 8px var(--glow-color), 0 0 20px var(--glow-dim); }
        100% { text-shadow: 0 0 15px var(--glow-color), 0 0 35px var(--glow-color), 0 0 40px var(--glow-dim); transform: scale(1.01); }
    }

    /* Message Block */
    .message {
        max-width: 600px;
        margin-top: 40px;
        font-size: 1.15rem;
        line-height: 2;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 0 5px var(--glow-dim);
        border-left: 3px solid var(--glow-color);
        border-right: 3px solid var(--glow-color);
        padding: 10px 30px;
        background: rgba(0, 20, 0, 0.2);
        backdrop-filter: blur(2px);
    }

    /* Polished Terminal Button */
    .download {
        margin-top: 50px;
        padding: 16px 40px;
        font-size: 1rem;
        font-weight: bold;
        letter-spacing: 4px;
        color: var(--glow-color);
        border: 2px solid var(--glow-color);
        background: transparent;
        text-decoration: none;
        box-shadow: 0 0 10px var(--glow-dim), inset 0 0 10px var(--glow-dim);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        cursor: pointer;
    }

    .download:hover {
        background: var(--glow-color);
        color: #000000;
        box-shadow: 0 0 25px var(--glow-color), inset 0 0 10px rgba(0,0,0,0.5);
        text-shadow: none;
        transform: translateY(-3px);
    }
    
    .download:active {
        transform: translateY(-1px);
    }

    /* Footer Metadata */
    .coordinates {
        position: absolute;
        bottom: 30px;
        font-size: 11px;
        letter-spacing: 5px;
        opacity: 0.35;
        color: var(--glow-color);
        text-shadow: 0 0 2px var(--glow-color);
        transition: opacity 0.3s;
    }

    .coordinates:hover {
        opacity: 0.8;
    }

</style>

<!--
Nothing is hidden.
Everything is hidden.
-->

</head>

<body>

    <div class="background"></div>
    <div class="overlay"></div>
    <div class="scanlines"></div>
    <div class="flicker"></div>

    <div class="content">

        <h1>PARALLAX</h1>

        <div class="message">
            The eye remembers what the mind forgets.<br>
            Download the image.<br>
            Look deeper.
        </div>

        <a class="download" href="images/image1.jpeg" download="image1.jpeg">
            DOWNLOAD ARCHIVE
        </a>

        <div class="coordinates">
            SEEN • FELT • REMEMBERED
        </div>

    </div>

</body>
</html>
